<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Slider Overlay</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #6dd5ed, #5f2c82);
    overflow: hidden;
}

/* container */
.container {
    position: relative;
    height: 100vh;
}

/* ผู้จัดทำ */
.author {
    position: absolute;
    left: 50px;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    z-index: 1; /* อยู่ล่าง */
    text-shadow: 2px 2px 5px black;
}
.author h1 {
    font-size: 50px;
}

.author p {
    font-size: 24px;
}

/* slider ลอย */
.slider {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    z-index: 2; /* อยู่บน */
}

/* slides */
.slides {
    display: flex;
    align-items: center;
    gap: 40px;
    transition: transform 0.5s ease;
}

/* รูปปกติ */
.slides img {
    width: 180px;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
    cursor: pointer;

    filter: grayscale(100%);
    opacity: 0.5;
    transition: all 0.4s ease;
}

/* ใกล้กลาง */
.slides img.near {
    transform: scale(1.1);
    opacity: 0.8;
}

/* กลาง */
.slides img.active {
    width: 320px;
    height: 460px;
    transform: scale(1.2);

    filter: grayscale(0%);
    opacity: 1;
    z-index: 5;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
</style>

</head>

<body>

<div class="container">

    <!-- ผู้จัดทำ -->
    <div class="author">
        <h1>68104529 ณฐกันต์ พุฒจีบ</h1>
        <p> </p>
        <p> </p>
        <p> </p> 
    </div>

    <!-- Slider -->
    <div class="slider">
        <div class="slides" id="slides">

            <img src="https://picsum.photos/id/1015/300/400">
            <img src="https://picsum.photos/id/1016/300/400">
            <img src="https://picsum.photos/id/1018/300/400">
            <img src="https://picsum.photos/id/1020/300/400">
            <img src="https://picsum.photos/id/1024/300/400">
            <img src="https://picsum.photos/id/1027/300/400">
            <img src="https://picsum.photos/id/1035/300/400">
            <img src="https://picsum.photos/id/1039/300/400">

        </div>
    </div>

</div>

<script>
const slides = document.getElementById("slides");
const images = document.querySelectorAll(".slides img");

let index = 3;

function updateSlider() {
    images.forEach((img, i) => {
        img.classList.remove("active", "near");

        if (i === index) {
            img.classList.add("active");
        } else if (i === index - 1 || i === index + 1) {
            img.classList.add("near");
        }
    });

    const sliderWidth = window.innerWidth;
    const activeImg = images[index];

    const offset = sliderWidth / 2 - activeImg.offsetWidth / 2 - activeImg.offsetLeft;

    slides.style.transform = `translateX(${offset}px)`;
}

images.forEach((img, i) => {
    img.addEventListener("click", () => {
        index = i;
        updateSlider();
    });
});

updateSlider();
</script>

</body>
</html>
